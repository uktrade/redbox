{% if tool %}
    {% for file in tool.get_files("ADMIN") %}
        <p class="govuk-body-s govuk-!-margin-top-2 govuk-!-margin-bottom-2 ids-text-ellipses ids-action-link" title="{{ file.file_name }}">
            <a class="govuk-link govuk-link--no-underline" href="{{ file.url }}">{{ file.file_name }}</a>
        </p>
    {% endfor %}
{% endif %}
